server:
  port: 9010

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:mysql://localhost:3306/frankenstein?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: root
    hikari:
      max-lifetime: 120000
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 10000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  is-read-header: true
  is-read-cookie: false
  is-read-body: false
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: false
  max-login-count: 12
  token-style: uuid
  is-log: false
  is-print: true
  is-color-log: false

logging:
  charset:
    console: UTF-8
    file: UTF-8

frankenstein:
  auth:
    login-max-failures: 5
    login-lock-minutes: 15
    member-max-devices-normal: 3
    member-max-devices-vip: 10
  order:
    pay-timeout-minutes: 30
    default-freight-amount: 0
    default-currency: CNY
  file:
    max-size-mb: 10
    allowed-extensions: jpg,jpeg,png,gif,webp,pdf,mp4,zip,mp3,wav,ogg,m4a,aac,webm
    signed-url-expire-seconds: 3600
    aliyun:
      enabled: false
      endpoint: oss-cn-hangzhou.aliyuncs.com
      access-key-id: your-access-key-id
      access-key-secret: your-access-key-secret
      bucket: your-bucket
      domain: https://your-bucket.oss-cn-hangzhou.aliyuncs.com
      path-prefix: frankenstein/
      private-access: false
    qiniu:
      enabled: false
      access-key: your-access-key
      secret-key: your-secret-key
      bucket: your-bucket
      domain: https://cdn.example.com
      path-prefix: frankenstein/
      private-access: false
